<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authenticator</title>

<script src="https://cdn.jsdelivr.net/npm/@otplib/preset-browser@12.0.1/buffer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@otplib/preset-browser@12.0.1/index.js"></script>

<style>
body {
    margin:0;
    font-family: system-ui;
    background:#f2f3f5;
}

.header {
    background:#fff;
    padding:16px;
    font-size:18px;
    font-weight:600;
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #eee;
}

.container {
    max-width:420px;
    margin:auto;
}

.card {
    background:#fff;
    margin:10px;
    padding:16px;
    border-radius:14px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    box-shadow:0 2px 6px rgba(0,0,0,0.06);
}

.info {
    display:flex;
    flex-direction:column;
}

.name {
    font-size:14px;
    color:#666;
}

.code {
    font-size:28px;
    font-weight:600;
    letter-spacing:2px;
    font-family: monospace;
}

.progress {
    width:36px;
    height:36px;
    border-radius:50%;
    border:3px solid #ddd;
    position:relative;
}

.progress::after {
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    border:3px solid #1a73e8;
    clip-path: inset(0 0 calc(var(--p)*1%) 0);
}

.edit .delete {
    display:block;
}

.delete {
    display:none;
    color:red;
    font-size:12px;
    cursor:pointer;
}

.fab {
    position:fixed;
    bottom:20px;
    right:20px;
    width:56px;
    height:56px;
    border-radius:50%;
    background:#1a73e8;
    color:#fff;
    font-size:28px;
    border:none;
}

.toast {
    position:fixed;
    bottom:80px;
    left:50%;
    transform:translateX(-50%);
    background:#333;
    color:#fff;
    padding:8px 14px;
    border-radius:6px;
    opacity:0;
    transition:0.2s;
}

.toast.show { opacity:1; }
</style>
</head>

<body>

<div class="header">
    Authenticator
    <span id="editBtn">编辑</span>
</div>

<div class="container" id="list"></div>

<button class="fab" id="addBtn">+</button>

<div class="toast" id="toast">已复制</div>

<script>
const totp = window.otplib.authenticator;

let accounts = JSON.parse(localStorage.getItem('mfa')||'[]');
let edit = false;

function parseInput(input){
    if(input.startsWith('otpauth://')){
        const url = new URL(input);
        return {
            name: decodeURIComponent(url.pathname.slice(1)),
            key: url.searchParams.get('secret')
        };
    }
    return {name:'手动添加', key:input};
}

function save(){
    localStorage.setItem('mfa', JSON.stringify(accounts));
}

function toast(msg){
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),1500);
}

function render(){
    const list = document.getElementById('list');
    list.innerHTML='';
    list.classList.toggle('edit', edit);

    const sec = Math.floor(Date.now()/1000)%30;
    const p = (30-sec)/30*100;

    accounts.forEach((acc,i)=>{
        let code='------';
        try{
            code = totp.generate(acc.key).replace(/(\d{3})(\d{3})/,'$1 $2');
        }catch{}

        const div=document.createElement('div');
        div.className='card';
        div.draggable = edit;

        div.innerHTML=`
            <div class="info">
                <div class="name">${acc.name}</div>
                <div class="code">${code}</div>
            </div>
            <div>
                <div class="progress" style="--p:${p}"></div>
                <div class="delete" data-i="${i}">删除</div>
            </div>
        `;

        div.onclick=async()=>{
            await navigator.clipboard.writeText(code.replace(' ',''));
            toast('已复制');
        };

        div.querySelector('.delete').onclick=(e)=>{
            e.stopPropagation();
            accounts.splice(i,1);
            save(); render();
        };

        div.ondragstart=()=>drag=i;
        div.ondrop=()=>{
            const item=accounts.splice(drag,1)[0];
            accounts.splice(i,0,item);
            save(); render();
        };
        div.ondragover=e=>e.preventDefault();

        list.appendChild(div);
    });
}

document.getElementById('editBtn').onclick=()=>{
    edit=!edit;
    render();
};

document.getElementById('addBtn').onclick=()=>{
    const input=prompt('输入密钥或 otpauth://');
    if(!input) return;
    accounts.push(parseInput(input));
    save(); render();
};

setInterval(render,1000);
render();
</script>

</body>
</html>
