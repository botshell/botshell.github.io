<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authenticator</title>

<script src="https://cdn.jsdelivr.net/npm/@otplib/preset-browser@12.0.1/buffer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@otplib/preset-browser@12.0.1/index.js"></script>

<style>
body{
    margin:0;
    font-family:system-ui;
    background:#f2f3f5;
}

.header{
    background:#fff;
    padding:16px;
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #eee;
}

.container{ max-width:420px; margin:auto; }

.card{
    background:#fff;
    margin:10px;
    padding:14px;
    border-radius:14px;
    box-shadow:0 2px 6px rgba(0,0,0,0.06);
    position:relative;
    overflow:hidden;
}

/* ===== 三行强制单行 ===== */
.name,.user,.code{
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
}

.name{
    font-size:14px;
    color:#666;
}

.user{
    font-size:12px;
    color:#999;
}

/* ===== 验证码展示 ===== */
.code{
    font-size:28px;
    font-weight:600;
    font-family:monospace;
}

/* ===== 编辑态 ===== */
.code.editable{
    font-size:14px;
    font-family:system-ui;
    font-weight:400;
    background:#f7f7f7;
    padding:6px;
    border-radius:6px;
}

/* ===== row ===== */
.row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:10px;
    gap:10px;
}

/* ===== SVG 圆环 ===== */
.ring{
    width:44px;
    height:44px;
}

.ring circle{
    fill:none;
    stroke-width:4;
    transform:rotate(-90deg);
    transform-origin:50% 50%;
}

.ring-bg{
    stroke:#ddd;
}

.ring-progress{
    stroke:#1a73e8;
    stroke-linecap:round;
    transition:stroke-dashoffset 0.3s linear;
}

.ring-text{
    font-size:12px;
    text-anchor:middle;
    dominant-baseline:middle;
    fill:#333;
}

/* ===== 未保存小点 ===== */
.dirty{
    position:absolute;
    top:10px;
    right:10px;
    width:8px;
    height:8px;
    background:red;
    border-radius:50%;
}

/* ===== 按钮 ===== */
button{
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}

.save{ background:#2da44e; color:#fff; }
.delete{ background:red; color:#fff; }

.fab{
    position:fixed;
    bottom:20px;
    right:20px;
    width:56px;
    height:56px;
    border-radius:50%;
    background:#1a73e8;
    color:#fff;
    font-size:28px;
}

.toast{
    position:fixed;
    bottom:80px;
    left:50%;
    transform:translateX(-50%);
    background:#333;
    color:#fff;
    padding:8px 14px;
    border-radius:6px;
    opacity:0;
}
.toast.show{opacity:1;}
</style>
</head>

<body>

<div class="header">
    Authenticator
    <span id="editBtn">编辑</span>
</div>

<div class="container" id="list"></div>

<button class="fab" id="addBtn">+</button>
<div class="toast" id="toast">已复制</div>

<script>
const totp = window.otplib.authenticator;

let accounts = JSON.parse(localStorage.getItem('mfa')||'[]');
let edit=false;
let adding=false;

/* ===== parse ===== */
function parseInput(input){
    if(input.startsWith('otpauth://')){
        const url=new URL(input);
        const label=decodeURIComponent(url.pathname.slice(1));
        let [issuer,user]=label.split(':');

        return {
            name:url.searchParams.get('issuer')||issuer||'',
            user:user||'',
            key:url.searchParams.get('secret')
        };
    }
    return {name:'',user:'',key:input};
}

/* ===== code ===== */
function getCode(acc){
    try{
        const key=acc.raw.startsWith('otpauth://')
            ? new URL(acc.raw).searchParams.get('secret')
            : acc.raw;

        return totp.generate(key);
    }catch{return '------'}
}

/* ===== save ===== */
function save(){
    localStorage.setItem('mfa',JSON.stringify(accounts));
}

/* ===== toast ===== */
function toast(){
    const t=document.getElementById('toast');
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),1200);
}

/* ===== ring ===== */
function createRing(sec){
    const remain = 30 - sec;

    const radius = 16;
    const circumference = 2 * Math.PI * radius;
    const offset = circumference * (1 - sec / 30);

    return `
    <svg class="ring" viewBox="0 0 44 44">
        <circle class="ring-bg" cx="22" cy="22" r="${radius}"></circle>
        <circle class="ring-progress"
            cx="22" cy="22" r="${radius}"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${offset}">
        </circle>
        <text x="22" y="22" class="ring-text">${remain}</text>
    </svg>`;
}

/* ===== render ===== */
function render(){
    const list=document.getElementById('list');
    list.innerHTML='';

    const sec=Math.floor(Date.now()/1000)%30;

    /* ===== ADD ===== */
    if(adding){
        const div=document.createElement('div');
        div.className='card';

        div.innerHTML=`
            <div class="name" contenteditable="true">未命名</div>
            <div class="user" contenteditable="true"></div>

            <div class="row">
                <div class="code editable" contenteditable="true"></div>
                ${createRing(sec)}
            </div>

            <div style="margin-top:10px;">
                <button class="save">保存</button>
                <button class="delete">取消</button>
            </div>
        `;

        div.querySelector('.save').onclick=()=>{
            const raw=div.querySelector('.code').innerText.trim();
            const parsed=parseInput(raw);

            accounts.unshift({
                raw,
                name:parsed.name||'未命名',
                user:parsed.user||''
            });

            adding=false;
            save();
            render();
        };

        div.querySelector('.delete').onclick=()=>{
            adding=false;
            render();
        };

        list.appendChild(div);
    }

    /* ===== LIST ===== */
    accounts.forEach((acc,i)=>{
        const code=getCode(acc);

        const div=document.createElement('div');
        div.className='card';

        div.innerHTML=`
            <div class="name" contenteditable="${edit}">${acc.name}</div>
            <div class="user" contenteditable="${edit}">${acc.user}</div>

            <div class="row">
                <div class="code ${edit?'editable':''}" contenteditable="${edit}">
                    ${edit?acc.raw:code}
                </div>

                ${createRing(sec)}
            </div>

            ${edit?`
                <div style="margin-top:10px;">
                    <button class="save">保存</button>
                    <button class="delete">删除</button>
                </div>
            `:''}
        `;

        let dirty=false;

        function markDirty(){
            if(!div.querySelector('.dirty')){
                const d=document.createElement('div');
                d.className='dirty';
                div.appendChild(d);
            }
        }

        if(edit){
            div.querySelectorAll('[contenteditable="true"]').forEach(el=>{
                el.oninput=markDirty;
            });

            div.querySelector('.save').onclick=()=>{
                const raw=div.querySelector('.code').innerText.trim();
                const name=div.querySelector('.name').innerText.trim();
                const user=div.querySelector('.user').innerText.trim();

                accounts[i]={
                    raw,
                    name,
                    user
                };

                save();
                render();
            };

            div.querySelector('.delete').onclick=()=>{
                accounts.splice(i,1);
                save();
                render();
            };
        }else{
            div.onclick=async()=>{
                await navigator.clipboard.writeText(code);
                toast();
            };
        }

        list.appendChild(div);
    });
}

/* ===== buttons ===== */
addBtn.onclick=()=>{adding=true;render();}
editBtn.onclick=()=>{edit=!edit;render();}

/* ===== tick ===== */
setInterval(()=>{
    render();
},1000);

render();
</script>

</body>
</html>
