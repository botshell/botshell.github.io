<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>网页版身份验证器 - 稳定版</title>
    <script src="https://cdn.jsdelivr.net/npm/otplib@12.0.1/otplib-browser.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 400px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        #addBtn { padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .item { border-bottom: 1px solid #eee; padding: 15px 0; display: flex; justify-content: space-between; align-items: center; }
        .code { font-size: 26px; font-weight: bold; color: #007bff; font-family: monospace; cursor: pointer; }
        .name { color: #666; font-size: 14px; margin-bottom: 4px; }
        .del-btn { background: #ff4d4f; color: white; border: none; border-radius: 4px; padding: 5px 10px; cursor: pointer; font-size: 12px; }
        .progress-bar { height: 4px; background: #eee; width: 100%; margin-top: 20px; }
        #progressInner { height: 100%; background: #007bff; width: 0%; transition: width 1s linear; }
    </style>
</head>
<body>

<div class="container">
    <h2>身份验证器</h2>
    
    <div class="input-group">
        <input type="text" id="nameInput" placeholder="账号名称 (如: Github)">
        <input type="text" id="keyInput" placeholder="Secret Key">
        <button id="addBtn">添加密钥</button>
    </div>

    <div id="keyList"></div>
    
    <div class="progress-bar">
        <div id="progressInner"></div>
    </div>
</div>

<script>
(function() {
    // 确保 otplib 加载成功
    const totp = window.otplib.totp;
    
    // 核心数据变量
    let accounts = [];

    // 从缓存初始化数据
    const loadData = () => {
        const saved = localStorage.getItem('mfa_keys');
        if (saved) {
            try {
                accounts = JSON.parse(saved);
            } catch(e) {
                accounts = [];
            }
        }
    };

    // 保存数据到缓存
    const saveData = () => {
        localStorage.setItem('mfa_keys', JSON.stringify(accounts));
    };

    // 渲染列表
    const render = () => {
        const listDiv = document.getElementById('keyList');
        listDiv.innerHTML = '';
        
        accounts.forEach((acc, index) => {
            let code = "------";
            try {
                // 清理密钥中的空格并转大写
                const cleanKey = acc.key.replace(/\s+/g, '').toUpperCase();
                code = totp.generate(cleanKey);
            } catch (e) {
                code = "KEY错误";
            }

            const row = document.createElement('div');
            row.className = 'item';
            row.innerHTML = `
                <div>
                    <div class="name">${acc.name}</div>
                    <div class="code" title="点击复制">${code}</div>
                </div>
                <button class="del-btn" data-index="${index}">删除</button>
            `;
            listDiv.appendChild(row);
        });
    };

    // 事件绑定：添加按钮
    document.getElementById('addBtn').addEventListener('click', () => {
        const nameInp = document.getElementById('nameInput');
        const keyInp = document.getElementById('keyInput');
        const name = nameInp.value.trim();
        const key = keyInp.value.trim();

        if (name && key) {
            accounts.push({ name, key });
            saveData();
            render();
            nameInp.value = '';
            keyInp.value = '';
        }
    });

    // 事件绑定：列表内部点击（删除和复制）
    document.getElementById('keyList').addEventListener('click', (e) => {
        // 处理删除
        if (e.target.classList.contains('del-btn')) {
            const index = e.target.getAttribute('data-index');
            if (confirm('确定删除吗？')) {
                accounts.splice(index, 1);
                saveData();
                render();
            }
        }
        // 处理复制
        if (e.target.classList.contains('code')) {
            const codeText = e.target.innerText;
            if (codeText !== "KEY错误" && codeText !== "------") {
                navigator.clipboard.writeText(codeText);
                alert('已复制: ' + codeText);
            }
        }
    });

    // 定时器：每秒更新进度条和数字
    setInterval(() => {
        const seconds = Math.floor(Date.now() / 1000) % 30;
        const remaining = 30 - seconds;
        document.getElementById('progressInner').style.width = (remaining / 30 * 100) + '%';
        
        if (seconds === 0) {
            render();
        }
    }, 1000);

    // 页面加载后的首次启动
    loadData();
    render();
})();
</script>

</body>
</html>
