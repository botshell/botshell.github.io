<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>身份验证器</title>

<script src="https://cdn.jsdelivr.net/npm/@otplib/preset-browser@12.0.1/buffer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@otplib/preset-browser@12.0.1/index.js"></script>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f6f8fa;
    padding: 20px;
}

.container {
    max-width: 420px;
    margin: auto;
    background: #fff;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid #d0d7de;
}

.item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid #eee;
}

.name {
    font-size: 13px;
    color: #666;
}

.code-wrapper {
    position: relative;
    cursor: pointer;
}

.code {
    font-size: 24px;
    font-family: monospace;
    font-weight: bold;
}

.tooltip {
    position: absolute;
    right: 0;
    top: -20px;
    font-size: 11px;
    background: #24292f;
    color: #fff;
    padding: 2px 6px;
    border-radius: 4px;
    opacity: 0;
    transition: 0.2s;
}

.tooltip.show {
    opacity: 1;
}

.del-btn {
    display: none;
    background: red;
    color: white;
    border: none;
    padding: 4px 8px;
    border-radius: 4px;
}

.edit-mode .del-btn {
    display: inline-block;
}

.top-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

button {
    cursor: pointer;
}
</style>
</head>

<body>
<div class="container">

<div class="top-bar">
    <button id="addBtn">添加</button>
    <button id="editBtn">管理</button>
</div>

<input id="nameInput" placeholder="名称">
<input id="keyInput" placeholder="Secret">

<div id="list"></div>

</div>

<script>
const totp = window.otplib.authenticator;

let accounts = [];
let editMode = false;
let dragIndex = null;

const load = () => {
    accounts = JSON.parse(localStorage.getItem('mfa') || '[]');
};

const save = () => {
    localStorage.setItem('mfa', JSON.stringify(accounts));
};

const render = () => {
    const list = document.getElementById('list');
    list.innerHTML = '';

    document.body.classList.toggle('edit-mode', editMode);

    accounts.forEach((acc, i) => {
        let code = "------";
        try {
            code = totp.generate(acc.key.replace(/\s+/g,'').toUpperCase());
        } catch {}

        const div = document.createElement('div');
        div.className = 'item';
        div.draggable = editMode;

        div.innerHTML = `
            <div>
                <div class="name">${acc.name}</div>
                <div class="code-wrapper">
                    <div class="code">${code}</div>
                    <div class="tooltip">Copied!</div>
                </div>
            </div>
            <button class="del-btn" data-i="${i}">删</button>
        `;

        // 复制
        div.querySelector('.code-wrapper').onclick = async () => {
            await navigator.clipboard.writeText(code);
            const tip = div.querySelector('.tooltip');
            tip.classList.add('show');
            setTimeout(()=>tip.classList.remove('show'),1500);
        };

        // 删除
        div.querySelector('.del-btn').onclick = () => {
            accounts.splice(i,1);
            save();
            render();
        };

        // 拖拽
        div.ondragstart = () => dragIndex = i;
        div.ondragover = e => e.preventDefault();
        div.ondrop = () => {
            const item = accounts.splice(dragIndex,1)[0];
            accounts.splice(i,0,item);
            save();
            render();
        };

        list.appendChild(div);
    });
};

document.getElementById('addBtn').onclick = () => {
    const name = nameInput.value.trim();
    const key = keyInput.value.trim();
    if(!name || !key) return;

    accounts.push({name,key});
    save();
    render();
};

document.getElementById('editBtn').onclick = () => {
    editMode = !editMode;
    render();
};

setInterval(render,1000);

load();
render();
</script>
</body>
</html>
