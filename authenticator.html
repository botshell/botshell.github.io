<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authenticator</title>

<script src="https://cdn.jsdelivr.net/npm/@otplib/preset-browser@12.0.1/buffer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@otplib/preset-browser@12.0.1/index.js"></script>

<style>
body { margin:0; font-family:system-ui; background:#f2f3f5; }

.header {
    background:#fff;
    padding:16px;
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #eee;
}

.container { max-width:420px; margin:auto; }

.card {
    background:#fff;
    margin:10px;
    padding:14px;
    border-radius:14px;
    box-shadow:0 2px 6px rgba(0,0,0,0.06);
}

.row { display:flex; justify-content:space-between; align-items:center; }

.name { font-size:14px; color:#666; }
.user { font-size:12px; color:#999; }
.code { font-size:28px; font-weight:600; font-family:monospace; }

.progress {
    width:36px; height:36px;
    border-radius:50%;
    border:3px solid #ddd;
    position:relative;
}

.progress::after {
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    border:3px solid #1a73e8;
    clip-path: inset(0 0 calc(var(--p)*1%) 0);
}

input {
    width:100%;
    margin:4px 0;
    padding:6px;
    border:1px solid #ddd;
    border-radius:6px;
}

.btns { display:flex; gap:6px; margin-top:6px; }

button {
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}

.save { background:#2da44e; color:#fff; }
.cancel { background:#aaa; color:#fff; }
.delete { background:red; color:#fff; display:none; }

.fab {
    position:fixed;
    bottom:20px;
    right:20px;
    width:56px;
    height:56px;
    border-radius:50%;
    background:#1a73e8;
    color:#fff;
    font-size:28px;
}

.toast {
    position:fixed;
    bottom:80px;
    left:50%;
    transform:translateX(-50%);
    background:#333;
    color:#fff;
    padding:8px 14px;
    border-radius:6px;
    opacity:0;
    transition:0.2s;
}

.toast.show { opacity:1; }
</style>
</head>

<body>

<div class="header">
    Authenticator
    <span id="editBtn">编辑</span>
</div>

<div class="container" id="list"></div>

<button class="fab" id="addBtn">+</button>
<div class="toast" id="toast">已复制</div>

<script>
const totp = window.otplib.authenticator;

let accounts = JSON.parse(localStorage.getItem('mfa')||'[]');
let edit = false;
let adding = false;

/* ========= 解析 ========= */
function parseInput(input){
    if(input.startsWith('otpauth://')){
        const url = new URL(input);
        const label = decodeURIComponent(url.pathname.slice(1));
        let [issuer, user] = label.split(':');

        return {
            name: url.searchParams.get('issuer') || issuer || '',
            user: user || '',
            key: url.searchParams.get('secret')
        };
    }
    return { name:'', user:'', key:input };
}

/* ========= 生成验证码 ========= */
function getCode(acc){
    try{
        let key = acc.raw.startsWith('otpauth://')
            ? new URL(acc.raw).searchParams.get('secret')
            : acc.raw;

        return totp.generate(key);
    }catch{
        return '------';
    }
}

/* ========= 存储 ========= */
function save(){
    localStorage.setItem('mfa', JSON.stringify(accounts));
}

/* ========= toast ========= */
function toast(){
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),1200);
}

/* ========= 渲染 ========= */
function render(){
    const list = document.getElementById('list');
    list.innerHTML = '';
    list.classList.toggle('edit', edit);

    const sec = Math.floor(Date.now()/1000)%30;
    const p = (30-sec)/30*100;

    /* ===== 添加卡片 ===== */
    if(adding){
        const div = document.createElement('div');
        div.className = 'card';

        div.innerHTML = `
            <input id="raw" placeholder="otpauth:// 或 Secret（必填）">
            <input id="name" placeholder="名称（可选）">
            <input id="user" placeholder="用户（可选）">
            <div class="btns">
                <button class="save">保存</button>
                <button class="cancel">取消</button>
            </div>
        `;

        div.querySelector('.save').onclick = () => {
            const raw = rawInput.value.trim();
            if(!raw) return;

            const parsed = parseInput(raw);

            accounts.unshift({
                raw,
                name: nameInput.value || parsed.name || '未命名',
                user: userInput.value || parsed.user || ''
            });

            adding = false;
            save();
            render();
        };

        div.querySelector('.cancel').onclick = () => {
            adding = false;
            render();
        };

        list.appendChild(div);
    }

    /* ===== 卡片 ===== */
    accounts.forEach((acc,i)=>{
        const code = getCode(acc);

        const div = document.createElement('div');
        div.className = 'card';

        if(edit){
            div.innerHTML = `
                <input value="${acc.raw}">
                <input value="${acc.name}">
                <input value="${acc.user}">
                <div class="btns">
                    <button class="save">保存</button>
                    <button class="delete">删除</button>
                </div>
            `;

            const [rawI,nameI,userI] = div.querySelectorAll('input');

            div.querySelector('.save').onclick = () => {
                const parsed = parseInput(rawI.value);

                accounts[i] = {
                    raw: rawI.value,
                    name: nameI.value || parsed.name || '未命名',
                    user: userI.value || parsed.user || ''
                };

                save();
                render();
            };

            div.querySelector('.delete').onclick = () => {
                accounts.splice(i,1);
                save();
                render();
            };

        } else {
            div.innerHTML = `
                <div class="row">
                    <div>
                        <div class="name">${acc.name}</div>
                        <div class="user">${acc.user}</div>
                        <div class="code">${code}</div>
                    </div>
                    <div class="progress" style="--p:${p}"></div>
                </div>
            `;

            div.onclick = async () => {
                await navigator.clipboard.writeText(code);
                toast();
            };
        }

        list.appendChild(div);
    });
}

/* ========= 防刷新核心修复 ========= */
function updateTick(){
    if(edit || adding) return; // ⭐关键：编辑/添加时完全冻结UI

    const sec = Math.floor(Date.now()/1000)%30;
    const p = (30-sec)/30*100;

    document.querySelectorAll('.card').forEach((card,i)=>{
        const acc = accounts[i];
        if(!acc) return;

        const codeEl = card.querySelector('.code');
        const progEl = card.querySelector('.progress');

        if(codeEl){
            codeEl.innerText = getCode(acc);
        }

        if(progEl){
            progEl.style.setProperty('--p', p);
        }
    });
}

/* ========= 事件 ========= */
addBtn.onclick = () => {
    adding = true;
    render();
};

editBtn.onclick = () => {
    edit = !edit;
    render();
};

/* ========= 定时器 ========= */
setInterval(updateTick, 1000);

/* ========= init ========= */
render();
</script>

</body>
</html>
