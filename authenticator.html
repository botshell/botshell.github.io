<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Authenticator</title>

<script src="https://cdn.jsdelivr.net/npm/@otplib/preset-browser@12.0.1/buffer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@otplib/preset-browser@12.0.1/index.js"></script>

<style>
body { margin:0; font-family:system-ui; background:#f2f3f5; }

.header {
    background:#fff;
    padding:16px;
    display:flex;
    justify-content:space-between;
    border-bottom:1px solid #eee;
}

.container { max-width:420px; margin:auto; }

.card {
    background:#fff;
    margin:10px;
    padding:14px;
    border-radius:14px;
    box-shadow:0 2px 6px rgba(0,0,0,0.06);
}

.row { display:flex; justify-content:space-between; align-items:center; }

.name { font-size:14px; color:#666; outline:none; }
.user { font-size:12px; color:#999; outline:none; }

.code {
    font-size:28px;
    font-weight:600;
    font-family:monospace;
    outline:none;
    padding:6px 0;
}

.code.editable {
    background:#f7f7f7;
    border-radius:6px;
    padding:8px;
    font-size:14px;
    color:#333;
    min-height:22px;
}

.progress {
    width:36px;
    height:36px;
    border-radius:50%;
    border:3px solid #ddd;
    position:relative;
}

.progress::after {
    content:"";
    position:absolute;
    inset:0;
    border-radius:50%;
    border:3px solid #1a73e8;
    clip-path: inset(0 0 calc(var(--p)*1%) 0);
}

button {
    border:none;
    padding:6px 10px;
    border-radius:6px;
    cursor:pointer;
}

.save { background:#2da44e; color:#fff; }
.cancel { background:#aaa; color:#fff; }
.delete { background:red; color:#fff; }

.fab {
    position:fixed;
    bottom:20px;
    right:20px;
    width:56px;
    height:56px;
    border-radius:50%;
    background:#1a73e8;
    color:#fff;
    font-size:28px;
}

.toast {
    position:fixed;
    bottom:80px;
    left:50%;
    transform:translateX(-50%);
    background:#333;
    color:#fff;
    padding:8px 14px;
    border-radius:6px;
    opacity:0;
    transition:0.2s;
}

.toast.show { opacity:1; }
</style>
</head>

<body>

<div class="header">
    Authenticator
    <span id="editBtn">编辑</span>
</div>

<div class="container" id="list"></div>

<button class="fab" id="addBtn">+</button>
<div class="toast" id="toast">已复制</div>

<script>
const totp = window.otplib.authenticator;

let accounts = JSON.parse(localStorage.getItem('mfa') || '[]');
let edit = false;
let adding = false;

/* 解析 */
function parseInput(input){
    if(input.startsWith('otpauth://')){
        const url = new URL(input);
        const label = decodeURIComponent(url.pathname.slice(1));
        let [issuer, user] = label.split(':');

        return {
            name: url.searchParams.get('issuer') || issuer || '',
            user: user || '',
            key: url.searchParams.get('secret')
        };
    }
    return { name:'', user:'', key:input };
}

/* code */
function getCode(acc){
    try{
        const key = acc.raw.startsWith('otpauth://')
            ? new URL(acc.raw).searchParams.get('secret')
            : acc.raw;

        return totp.generate(key);
    }catch{
        return '------';
    }
}

/* save */
function save(){
    localStorage.setItem('mfa', JSON.stringify(accounts));
}

/* toast */
function toast(){
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'),1200);
}

/* render */
function render(){
    const list = document.getElementById('list');
    list.innerHTML = '';

    const sec = Math.floor(Date.now()/1000)%30;
    const p = (30-sec)/30*100;

    /* ===== ADD ===== */
    if(adding){
        const div = document.createElement('div');
        div.className = 'card';

        div.innerHTML = `
            <div class="name" contenteditable="true">未命名</div>
            <div class="user" contenteditable="true"></div>

            <div class="code editable" contenteditable="true"
                 data-placeholder="输入 secret 或 otpauth://"></div>

            <div class="btns" style="margin-top:10px;">
                <button class="save">保存</button>
                <button class="cancel">取消</button>
            </div>
        `;

        div.querySelector('.save').onclick = () => {
            const name = div.querySelector('.name').innerText.trim();
            const user = div.querySelector('.user').innerText.trim();
            const raw = div.querySelector('.code').innerText.trim();

            if(!raw) return;

            const parsed = parseInput(raw);

            accounts.unshift({
                raw,
                name: name || parsed.name || '未命名',
                user: user || parsed.user || ''
            });

            adding = false;
            save();
            render();
        };

        div.querySelector('.cancel').onclick = () => {
            adding = false;
            render();
        };

        list.appendChild(div);
    }

    /* ===== LIST ===== */
    accounts.forEach((acc,i)=>{
        const code = getCode(acc);

        const div = document.createElement('div');
        div.className = 'card';

        const editable = edit ? 'editable' : '';

        div.innerHTML = `
            <div class="name" contenteditable="${edit}">${acc.name}</div>
            <div class="user" contenteditable="${edit}">${acc.user}</div>

            <div class="code ${editable}" contenteditable="${edit}">
                ${edit ? acc.raw : code}
            </div>

            ${edit ? `
            <div class="btns" style="margin-top:10px;">
                <button class="save">保存</button>
                <button class="delete">删除</button>
            </div>` : `
            <div class="row" style="margin-top:8px;">
                <div class="progress" style="--p:${p}"></div>
            </div>`}
        `;

        if(edit){
            div.querySelector('.save').onclick = () => {
                const name = div.querySelector('.name').innerText.trim();
                const user = div.querySelector('.user').innerText.trim();
                const raw = div.querySelector('.code').innerText.trim();

                const parsed = parseInput(raw);

                accounts[i] = {
                    raw,
                    name: name || parsed.name || '未命名',
                    user: user || parsed.user || ''
                };

                save();
                render();
            };

            div.querySelector('.delete').onclick = () => {
                accounts.splice(i,1);
                save();
                render();
            };
        } else {
            div.onclick = async () => {
                await navigator.clipboard.writeText(code);
                toast();
            };
        }

        list.appendChild(div);
    });
}

/* buttons */
addBtn.onclick = () => {
    adding = true;
    render();
};

editBtn.onclick = () => {
    edit = !edit;
    render();
};

/* tick */
setInterval(() => {
    if (edit || adding) return;

    const sec = Math.floor(Date.now()/1000)%30;
    const p = (30-sec)/30*100;

    document.querySelectorAll('.card').forEach((card,i)=>{
        const acc = accounts[i];
        if(!acc) return;

        const codeEl = card.querySelector('.code');
        const progEl = card.querySelector('.progress');

        if(codeEl) codeEl.innerText = getCode(acc);
        if(progEl) progEl.style.setProperty('--p', p);
    });

}, 1000);

render();
</script>

</body>
</html>
